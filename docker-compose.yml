# Local development dependencies: PostgreSQL 16 and Mailpit (SMTP catcher).
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: tiketin-postgres
    environment:
      POSTGRES_DB: tiketin
      POSTGRES_USER: tiketin
      POSTGRES_PASSWORD: tiketin
    ports:
      - "5432:5432"
    volumes:
      - tiketin-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiketin -d tiketin"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: tiketin-mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  tiketin-pgdata:
